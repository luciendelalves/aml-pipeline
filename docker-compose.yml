version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: aml_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: pld2024
      POSTGRES_DB: aml_pipeline
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: